<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberPro | لوحة المراقبة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="brand">
      <i class="fas fa-cut"></i>
      BarberPro
    </div>
    <div class="nav-controls">
      <div class="connection-badge" id="connectionBadge">
        <span class="dot online"></span>
        <span class="conn-label">متصل</span>
        <span class="conn-text" style="font-size:11px;color:var(--text-muted)">0ms</span>
      </div>
      <span style="font-size:11px;color:var(--text-muted)" id="serverUrl"></span>
      <button class="btn btn-sm" id="refreshBtn" title="تحديث"><i class="fas fa-sync-alt"></i></button>
      <select id="refreshRate" class="btn btn-sm" style="padding:5px 6px;font-size:11px;">
        <option value="5000">5 ثوان</option>
        <option value="30000" selected>30 ثانية</option>
        <option value="60000">1 دقيقة</option>
        <option value="0">يدوي</option>
      </select>
      <button class="btn btn-sm" id="themeToggle" title="تبديل الثيم"><i class="fas fa-moon"></i></button>
      <button class="btn btn-sm" id="disconnectBtn" title="قطع الاتصال"><i class="fas fa-power-off"></i></button>
    </div>
  </nav>

  <div class="container">
    <div id="loadingState" class="loading">
      <div class="spinner"></div> جاري تحميل البيانات...
    </div>

    <div id="errorState" class="error-state" style="display:none;">
      <i class="fas fa-exclamation-triangle"></i>
      <p id="errorMessage">فشل الاتصال بالخادم</p>
      <button class="btn btn-primary retry-btn" id="retryBtn"><i class="fas fa-redo"></i> إعادة المحاولة</button>
    </div>

    <div class="dashboard-content" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:12px;color:var(--text-muted)" id="lastSync"></span>
        <span style="font-size:12px;color:var(--text-muted)" id="avgTransaction"></span>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="charts-grid">
        <div class="glass chart-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <h3 style="font-size:13px;color:var(--text-secondary);font-weight:600;"><i class="fas fa-chart-bar"></i> الإيرادات</h3>
            <select id="chartRange" style="padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:11px;outline:none;">
              <option value="7">7 أيام</option>
              <option value="14">14 يوم</option>
              <option value="30">30 يوم</option>
            </select>
          </div>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="glass chart-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <h3 style="font-size:13px;color:var(--text-secondary);font-weight:600;"><i class="fas fa-chair"></i> توزيع الكراسي</h3>
          </div>
          <canvas id="chairChart" style="max-height:180px;"></canvas>
          <div id="perChairBreakdown" style="margin-top:8px;"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="glass" style="padding:0;margin-bottom:12px;overflow:hidden;">
        <div style="display:flex;" id="tabBar">
          <button class="tab-btn active" data-tab="transactions"><i class="fas fa-receipt"></i> المعاملات</button>
          <button class="tab-btn" data-tab="customers"><i class="fas fa-users"></i> الزبائن</button>
          <button class="tab-btn" data-tab="products"><i class="fas fa-box"></i> المنتجات</button>
        </div>
      </div>

      <!-- === TAB: Transactions === -->
      <div class="tab-content" id="tab-transactions">
        <div class="glass table-card">
          <div class="table-header">
            <h3><i class="fas fa-receipt"></i> المعاملات</h3>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
              <span id="totalTransactions" style="font-size:11px;color:var(--text-muted)"></span>
              <button class="btn btn-sm" id="exportTransBtn" title="تصدير CSV"><i class="fas fa-download"></i></button>
              <div class="search-box"><i class="fas fa-search" style="color:var(--text-muted);font-size:11px;"></i><input type="text" id="transSearch" placeholder="بحث..."></div>
              <select id="transWorkerFilter"><option value="">كل الكراسي</option></select>
              <select id="transFilter"><option value="all">الكل</option><option value="today">اليوم</option><option value="week">الأسبوع</option><option value="month">الشهر</option></select>
              <input type="number" id="transMinAmount" placeholder="أقل مبلغ" style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:11px;outline:none;">
              <input type="number" id="transMaxAmount" placeholder="أقصى مبلغ" style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text-primary);font-size:11px;outline:none;">
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr>
                <th data-sort="id" class="sortable"># <i class="fas fa-sort"></i></th>
                <th data-sort="customer" class="sortable">الزبون <i class="fas fa-sort"></i></th>
                <th data-sort="worker" class="sortable">الكرسي <i class="fas fa-sort"></i></th>
                <th data-sort="amount" class="sortable">المبلغ <i class="fas fa-sort"></i></th>
                <th data-sort="discount" class="sortable">الخصم <i class="fas fa-sort"></i></th>
                <th data-sort="timestamp" class="sortable">التاريخ <i class="fas fa-sort"></i></th>
              </tr></thead>
              <tbody id="transactionsBody"></tbody>
            </table>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
            <span style="font-size:11px;color:var(--text-muted)" id="transRangeInfo"></span>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:11px;color:var(--text-muted)">عرض:</span>
              <select id="transPageSize" style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-primary);font-size:11px;outline:none;">
                <option value="10">10</option>
                <option value="15" selected>15</option>
                <option value="25">25</option>
                <option value="50">50</option>
              </select>
              <div class="pagination" id="transPagination"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- === TAB: Customers === -->
      <div class="tab-content" id="tab-customers" style="display:none;">
        <div class="glass table-card">
          <div class="table-header">
            <h3><i class="fas fa-users"></i> الزبائن</h3>
            <div style="display:flex;gap:6px;align-items:center;">
              <button class="btn btn-sm" id="exportCustBtn" title="تصدير CSV"><i class="fas fa-download"></i></button>
              <div class="search-box"><i class="fas fa-search" style="color:var(--text-muted);font-size:11px;"></i><input type="text" id="custSearch" placeholder="بحث..."></div>
              <select id="custMinVisits" style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-primary);font-size:11px;outline:none;">
                <option value="0">كل الزيارات</option>
                <option value="1">1+ زيارة</option>
                <option value="5">5+ زيارة</option>
                <option value="10">10+ زيارة</option>
                <option value="20">20+ زيارة</option>
              </select>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr>
                <th data-sort="name" class="sortable">الاسم <i class="fas fa-sort"></i></th>
                <th>الهاتف</th>
                <th data-sort="visits" class="sortable">الزيارات <i class="fas fa-sort"></i></th>
                <th data-sort="spent" class="sortable">إجمالي الإنفاق <i class="fas fa-sort"></i></th>
                <th>آخر زيارة</th>
              </tr></thead>
              <tbody id="customersBody"></tbody>
            </table>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
            <span style="font-size:11px;color:var(--text-muted)" id="custRangeInfo"></span>
            <div class="pagination" id="custPagination"></div>
          </div>
        </div>
        <!-- Top customers mini chart -->
        <div class="glass" style="padding:12px;margin-top:12px;">
          <h3 style="font-size:13px;color:var(--text-secondary);font-weight:600;margin-bottom:8px;"><i class="fas fa-trophy"></i> أفضل الزبائن (إنفاقاً)</h3>
          <div id="topCustomersChart"></div>
        </div>
      </div>

      <!-- === TAB: Products === -->
      <div class="tab-content" id="tab-products" style="display:none;">
        <div class="glass table-card">
          <div class="table-header">
            <h3><i class="fas fa-box"></i> المنتجات والمخزون</h3>
            <div style="display:flex;gap:6px;align-items:center;">
              <button class="btn btn-sm" id="exportProdBtn" title="تصدير CSV"><i class="fas fa-download"></i></button>
              <div class="search-box"><i class="fas fa-search" style="color:var(--text-muted);font-size:11px;"></i><input type="text" id="prodSearch" placeholder="بحث..."></div>
              <select id="prodStockFilter" style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-primary);font-size:11px;outline:none;">
                <option value="all">كل المنتجات</option>
                <option value="low">منخفض المخزون</option>
                <option value="instock">متوفر</option>
                <option value="out">نافد</option>
              </select>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr>
                <th data-sort="name" class="sortable">الاسم <i class="fas fa-sort"></i></th>
                <th data-sort="quantity" class="sortable">الكمية <i class="fas fa-sort"></i></th>
                <th data-sort="buy_price" class="sortable">سعر الشراء <i class="fas fa-sort"></i></th>
                <th data-sort="sell_price" class="sortable">سعر البيع <i class="fas fa-sort"></i></th>
                <th>الربح</th>
                <th data-sort="category" class="sortable">الفئة <i class="fas fa-sort"></i></th>
                <th>المورد</th>
              </tr></thead>
              <tbody id="productsBody"></tbody>
            </table>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
            <span style="font-size:11px;color:var(--text-muted)" id="prodRangeInfo"></span>
            <div class="pagination" id="prodPagination"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
  .tab-btn {
    flex:1;padding:10px 16px;border:none;background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;
  }
  .tab-btn:hover { color:var(--text-primary);background:var(--bg-card-hover); }
  .tab-btn.active { color:var(--accent);border-bottom-color:var(--accent);background:rgba(108,99,255,0.05); }
  .sortable { cursor:pointer;user-select:none; }
  .sortable:hover { color:var(--text-primary); }
  .sort-asc i::before { content:"\f0de"; }
  .sort-desc i::before { content:"\f0dd"; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/connection.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
