<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberPro | اتصال</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">
</head>
<body>
  <div class="connection-page" id="app">
    <div class="glass connection-card" id="connectingView" style="display:none;">
      <div class="loading" style="padding:20px;">
        <div class="spinner"></div>
        جاري الاتصال بالخادم...
      </div>
    </div>

    <div class="glass connection-card" id="connectView">
      <div class="logo">💈</div>
      <h1>BarberPro</h1>
      <p>لوحة المراقبة عن بعد</p>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:20px;">
        أدخل عنوان الخادم (IP:port) للاتصال بالتطبيق
      </p>
      <div class="input-group">
        <label for="serverUrl"><i class="fas fa-server"></i> عنوان الخادم</label>
        <input type="text" id="serverUrl" placeholder="192.168.1.100:9000" dir="ltr" style="text-align:left;">
      </div>
      <button class="btn btn-primary" id="connectBtn" onclick="handleConnect()">
        <i class="fas fa-plug"></i> اتصال
      </button>
      <button class="btn" id="savedBtn" style="display:none;" onclick="handleSaved()">
        <i class="fas fa-history"></i> الاتصال بالخادم المحفوظ
      </button>
      <div id="errorMsg" class="error"></div>
      <div id="loadingMsg" class="loading" style="display:none;padding:12px;">
        <div class="spinner"></div> جاري الاتصال...
      </div>
      <div class="connection-info">
        <i class="fas fa-info-circle"></i>
        تأكد من تشغيل الخادم في التطبيق (الإعدادات ← المراقبة عن بعد)
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/connection.js"></script>
  <script>
    function showView(id) {
      document.querySelectorAll('#app > .glass').forEach(v => v.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    async function tryOrigin() {
      if (!ConnectionManager.isSameOrigin()) return false;
      const origin = ConnectionManager.getOriginUrl();
      try {
        const resp = await fetch(origin + '/api/status', { headers: { 'Accept': 'application/json' } });
        if (resp.ok) {
          ConnectionManager.save({ url: origin, lastConnected: new Date().toISOString() });
          window.location.href = 'dashboard.html';
          return true;
        }
      } catch (_) {}
      return false;
    }

    async function handleConnect() {
      const input = document.getElementById('serverUrl');
      const errorEl = document.getElementById('errorMsg');
      const loadingEl = document.getElementById('loadingMsg');
      let url = input.value.trim();
      if (!url) { errorEl.textContent = 'يرجى إدخال عنوان الخادم'; return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url;
      errorEl.textContent = '';
      loadingEl.style.display = 'flex';
      try {
        await ConnectionManager.connect(url);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = 'خطأ في الاتصال: ' + (err.message || 'تعذر الاتصال');
      } finally {
        loadingEl.style.display = 'none';
      }
    }

    function handleSaved() {
      const saved = ConnectionManager.load();
      if (saved && saved.url) {
        document.getElementById('serverUrl').value = saved.url.replace(/^https?:\/\//, '');
        handleConnect();
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      showView('connectingView');
      const connected = await tryOrigin();
      if (connected) return;

      showView('connectView');
      const saved = ConnectionManager.load();
      if (saved && saved.url) {
        document.getElementById('serverUrl').value = saved.url.replace(/^https?:\/\//, '');
        document.getElementById('savedBtn').style.display = 'flex';
      }
      document.getElementById('serverUrl').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleConnect();
      });
    });
  </script>
</body>
</html>
