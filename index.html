<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberPro | اتصال</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">
</head>
<body>
  <div class="connection-page" id="app">
    <div class="glass connection-card" id="connectView">
      <div class="logo">💈</div>
      <h1>BarberPro</h1>
      <p>لوحة المراقبة عن بعد</p>
      <div class="input-group">
        <label for="serverUrl"><i class="fas fa-server"></i> عنوان الخادم</label>
        <input type="text" id="serverUrl" placeholder="192.168.1.100:9000" dir="ltr" style="text-align:left;">
      </div>
      <button class="btn btn-primary" onclick="openDashboard()">
        <i class="fas fa-external-link-alt"></i> فتح اللوحة
      </button>
      <button class="btn" id="savedBtn" style="display:none;" onclick="openSaved()">
        <i class="fas fa-history"></i> فتح المحفوظ
      </button>
      <div id="errorMsg" class="error"></div>
      <div class="connection-info">
        <i class="fas fa-info-circle"></i>
        افتح التطبيق ← الإعدادات ← المراقبة عن بعد ← امسح QR أو انسخ الرابط
      </div>
    </div>
  </div>

  <script src="js/connection.js"></script>
  <script>
    function openDashboard() {
      const input = document.getElementById('serverUrl');
      const errorEl = document.getElementById('errorMsg');
      let url = input.value.trim();
      if (!url) { errorEl.textContent = 'أدخل عنوان الخادم'; return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url;
      ConnectionManager.save({ url, lastConnected: new Date().toISOString() });
      window.location.href = url;
    }

    function openSaved() {
      const s = ConnectionManager.load();
      if (s && s.url) {
        document.getElementById('serverUrl').value = s.url.replace(/^https?:\/\//, '');
        openDashboard();
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const s = ConnectionManager.load();
      if (s && s.url) {
        document.getElementById('serverUrl').value = s.url.replace(/^https?:\/\//, '');
        document.getElementById('savedBtn').style.display = 'inline-flex';
      }
      document.getElementById('serverUrl').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') openDashboard();
      });
    });
  </script>
</body>
</html>
